sonar.projectKey=artifact-keeper_artifact-keeper-ios
sonar.organization=artifact-keeper

# Exclude test files from analysis
sonar.exclusions=**/Tests/**

# Coverage from swift test --enable-code-coverage, exported via llvm-cov
sonar.coverageReportPaths=sonar-coverage.xml

# SwiftUI views require UI tests for coverage instrumentation.
# Exclude them so coverage measures testable logic (helpers, managers, view models).
sonar.coverage.exclusions=**/*View.swift,\
  **/*Screen.swift,\
  **/App/ArtifactKeeperApp.swift,\
  **/App/MainTabView.swift,\
  **/UI/**/*.swift
